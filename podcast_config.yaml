# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    統一播客配置 - Unified Podcast Config                    ║
# ║              只需選擇等級和長度，自動配置自然對話風格                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        用戶選擇 (User Selection)                           │
# └─────────────────────────────────────────────────────────────────────────┘
basic:
  # 英語等級（教學導向漸進式設計）
  # A1: 英語老師 - 明確教學，語言重點優先
  # A2: 語言引導者 - 自然指導，實用表達教學  
  # B1: 對話導師 - 內容討論中穿插語言教導
  # B2: 分析者 - 深入對話，偶爾語言提點
  # C1: 智者 - 快速洞察，專注內容分析
  # C2: 大師 - 專精論述，純內容導向
  english_level: "A1"
  
  # 播客長度
  # short: 3-5分鐘, medium: 6-10分鐘, long: 11-15分鐘, extra-long: 16-45分鐘
  podcast_length: "short"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            輸入來源 (Input Sources)                        │
# └─────────────────────────────────────────────────────────────────────────┘
input:
  # 多資料來源支援
  sources:
    - "https://www.popsci.com/gear/best-of-ces-2025/"
  type: "multi"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      等級自動配置 (Level Auto-Configuration)                │
# └─────────────────────────────────────────────────────────────────────────┘
# 🤖 系統會根據選擇的 english_level 自動應用以下配置
level_configs:
  A1:  # 英語老師 - 明確教學導向
    style_name: "英語老師"
    conversation_style: ["teaching", "patient", "encouraging", "clear", "instructive"]
    voices: { host_voice: "Zephyr", expert_voice: "Puck" }
    pace: "slow"
    knowledge_density: "very_low"
    interaction_level: "high"
    creativity: 0.4
    techniques: ["explicit teaching", "language pattern explanation", "vocabulary building", "grammar highlighting", "pronunciation guidance"]
    dialogue_structure: [
      "Welcome & Learning Goals",
      "Key Vocabulary Introduction",
      "Content with Language Teaching", 
      "Grammar & Usage Explanations",
      "Practice & Reinforcement",
      "Summary & Language Review"
    ]
    conversation_markers: [
      "Let me teach you this useful phrase...",
      "Notice how we say... instead of...",
      "This is a common way to express...",
      "Pay attention to this grammar pattern...",
      "Let's practice this vocabulary..."
    ]
    
    # 語言教學元素
    language_teaching_elements:
      teaching_style: "explicit_instruction"        # 明確指導式教學
      focus_areas: ["vocabulary", "grammar", "pronunciation", "common_phrases"]
      teaching_markers: [
        "In English, we often say...",
        "A useful phrase here is...",
        "Notice the grammar pattern...",
        "Let me explain this expression...",
        "This is pronounced as..."
      ]
      error_correction: "gentle_modeling"           # 溫和示範式糾錯
      repetition_for_learning: "high"              # 高頻率學習重複
    # 專業結構化配置
    engagement_factors: ["questions", "examples", "simple analogies", "encouraging discoveries"]
    interaction_markers: ["gentle transitions", "patient pauses", "supportive acknowledgments"]
    transition_phrases: [
      "Let's explore this together...",
      "What do you think about...",
      "That reminds me...",
      "I'm curious about..."
    ]
    content_pacing: "slow"  # 段落間充分停頓
    structural_depth: "basic"  # 簡單2-3層結構
    
    # 概念拆解與重複配置
    concept_processing:
      explanation_depth: "immediate"  # 立即解釋所有複雜概念
      breakdown_style: "simple_analogy"  # 用簡單類比拆解
      technical_terms: "avoid_completely"  # 完全避免技術術語
    
    vocabulary_adaptation:
      complexity_level: "basic_everyday"  # 基礎日常詞彙
      explanation_trigger: "any_unfamiliar"  # 任何不熟悉詞彙都解釋
      synonym_usage: "simpler_alternatives"  # 使用更簡單的同義詞
    
    repetition_strategy:
      frequency: "high"  # 高頻重複重要概念
      methods: ["paraphrasing", "analogies", "examples", "questions"]
      pattern: "immediate_reinforce"  # 概念出現後立即強化
    
    # 標籤嵌入策略配置
    tag_embedding:
      density: "moderate"               # 標籤使用密度
      emotion_range: ["gentle", "curious", "supportive", "happy", "thoughtful", "excited", "surprised", "warm", "delighted", "interested"]
      pause_frequency: "high"           # 暫停頻率
      prosody_usage: "selective"        # 語調變化使用程度
      primary_style: "[conversational]"
    
  A2:  # 語言引導者 - 自然語言指導
    style_name: "語言引導者"
    conversation_style: ["guiding", "supportive", "natural", "encouraging", "helpful"]
    voices: { host_voice: "Kore", expert_voice: "Charon" }  # 溫和女+沈穩男
    pace: "slow"
    knowledge_density: "low"
    interaction_level: "high"
    creativity: 0.4
    techniques: ["natural language guidance", "contextual teaching", "usage examples", "friendly corrections", "encouraging practice"]
    dialogue_structure: [
      "Friendly Introduction & Language Focus",
      "Content with Natural Language Tips",
      "Usage Examples & Applications", 
      "Common Expressions & Phrases",
      "Practice Through Discussion",
      "Language Summary & Encouragement"
    ]
    conversation_markers: [
      "Here's a useful expression you can use...",
      "Native speakers often say...",
      "A better way to express this would be...",
      "This reminds me of another common phrase...",
      "You'll often hear people say..."
    ]
    
    # 語言教學元素
    language_teaching_elements:
      teaching_style: "natural_guidance"           # 自然引導式教學
      focus_areas: ["common_expressions", "natural_usage", "everyday_phrases", "conversation_skills"]
      teaching_markers: [
        "Here's how native speakers say it...",
        "A natural way to express this is...",
        "You might also hear...",
        "This phrase is very common...",
        "People usually say..."
      ]
      error_correction: "indirect_modeling"        # 間接示範式糾錯
      repetition_for_learning: "moderate_high"     # 中高頻率學習重複
    # 專業結構化配置
    engagement_factors: ["questions", "examples", "familiar analogies", "step-by-step explanations"]
    interaction_markers: ["clarifying questions", "understanding checks", "encouraging nods"]
    transition_phrases: [
      "That's a great point, let me build on that...",
      "So if I understand correctly...",
      "That reminds me of...",
      "Let's think about this step by step..."
    ]
    content_pacing: "slow"  # 適度停頓和思考時間
    structural_depth: "layered"  # 3-4層漸進結構
    
    # 概念拆解與重複配置
    concept_processing:
      explanation_depth: "step_by_step"  # 逐步建立概念理解
      breakdown_style: "familiar_examples"  # 用熟悉例子拆解
      technical_terms: "explain_when_used"  # 使用時立即解釋
    
    vocabulary_adaptation:
      complexity_level: "intermediate_friendly"  # 中等友善詞彙
      explanation_trigger: "technical_terms"  # 技術術語觸發解釋
      synonym_usage: "clarifying_alternatives"  # 澄清性同義詞
    
    repetition_strategy:
      frequency: "moderate_high"  # 中高頻重複
      methods: ["rephrasing", "examples", "building_understanding"]
      pattern: "gradual_reinforce"  # 漸進式強化理解
    
    # 標籤嵌入策略配置
    tag_embedding:
      density: "moderate"               # 標籤使用密度
      emotion_range: ["curious", "interested", "thoughtful", "supportive", "gentle", "empathetic", "sincere", "amused", "confident", "engaged"]
      pause_frequency: "moderate_high"  # 暫停頻率
      prosody_usage: "moderate"         # 語調變化使用程度
      primary_style: "[conversational]"
    
  B1:  # 對話導師 - 內容中穿插語言教導
    style_name: "對話導師"
    conversation_style: ["conversational", "helpful", "natural", "educational", "engaging"]
    voices: { host_voice: "Aoede", expert_voice: "Puck" }  # 優雅女+活潑男
    pace: "moderate"
    knowledge_density: "medium"
    interaction_level: "medium"
    creativity: 0.5
    techniques: ["natural teaching integration", "contextual language tips", "discussion with guidance", "alternative expressions", "subtle corrections"]
    dialogue_structure: [
      "Natural Opening & Topic Setting",
      "Discussion with Language Insights",
      "Exploring Ideas & Expressions",
      "Alternative Ways to Say Things", 
      "Deeper Conversation & Language Use",
      "Takeaways & Useful Phrases"
    ]
    conversation_markers: [
      "That's a great way to put it - we often say...",
      "Speaking of which, there's a useful expression...",
      "You know, native speakers might phrase this as...",
      "This reminds me of a common idiom...",
      "Here's another way to express the same idea..."
    ]
    
    # 語言教學元素
    language_teaching_elements:
      teaching_style: "natural_integration"        # 自然整合式教學
      focus_areas: ["alternative_expressions", "idiomatic_usage", "natural_phrasing", "conversation_flow"]
      teaching_markers: [
        "That's a great way to put it...",
        "Another way to say this would be...",
        "Native speakers often use...",
        "There's an interesting expression...",
        "You might also hear..."
      ]
      error_correction: "conversational_recast"    # 對話式重塑糾錯
      repetition_for_learning: "moderate"          # 適度學習重複
    # 專業結構化配置
    engagement_factors: ["questions", "examples", "analogies", "comparative analysis", "multiple perspectives"]
    interaction_markers: ["thoughtful transitions", "analytical bridges", "perspective shifts"]
    transition_phrases: [
      "What's really interesting here is...",
      "Building on what you said...",
      "From a different angle...",
      "This connects to something broader...",
      "Let me give you a concrete example...",
      "The implications of this are..."
    ]
    content_pacing: "moderate"  # 平衡的節奏感
    structural_depth: "sophisticated"  # 4-5層深入分析
    
    # 概念拆解與重複配置
    concept_processing:
      explanation_depth: "contextual"  # 根據上下文決定解釋深度
      breakdown_style: "comparative_analysis"  # 對比分析式拆解
      technical_terms: "introduce_then_use"  # 介紹後自然使用
    
    vocabulary_adaptation:
      complexity_level: "mixed_professional"  # 混合專業詞彙
      explanation_trigger: "complex_concepts"  # 複雜概念觸發拆解
      synonym_usage: "varied_expression"  # 多樣化表達方式
    
    repetition_strategy:
      frequency: "moderate"  # 適度重複
      methods: ["reframing", "multiple_angles", "connecting_ideas"]
      pattern: "strategic_reinforce"  # 戰略性強化關鍵概念
    
    # 標籤嵌入策略配置
    tag_embedding:
      density: "high"                   # 標籤使用密度
      emotion_range: ["thoughtful", "engaged", "analytical", "curious", "balanced", "confident", "amused", "empathetic", "passionate", "insightful", "surprised"]
      pause_frequency: "moderate"       # 暫停頻率
      prosody_usage: "rich"             # 語調變化使用程度
      primary_style: "[conversational]"
    
  B2:  # 分析者 - 深入對話
    style_name: "分析者"
    conversation_style: ["analytical", "sophisticated", "insightful", "professional", "articulate"]
    voices: { host_voice: "Aoede", expert_voice: "Fenrir" }  # 優雅女+專業男
    pace: "moderate-fast"
    knowledge_density: "medium-high"
    interaction_level: "medium"
    creativity: 0.6
    techniques: ["nuanced examples", "analytical thinking", "abstract concepts", "probing questions", "strategic connections"]
    dialogue_structure: [
      "Opening Analysis & Core Focus",
      "Key Insights & Critical Points",
      "Nuanced Perspectives & Complexity",
      "Strategic Implications & Connections",
      "Advanced Analysis & Synthesis",
      "Forward-Looking Reflections"
    ]
    conversation_markers: [
      "The really interesting aspect here is...",
      "What this suggests to me is...",
      "There's a deeper pattern here...",
      "The implications extend to...",
      "By the way, we often describe this as...",
      "Incidentally, there's a precise term for this..."
    ]
    # 專業結構化配置
    engagement_factors: ["analytical questions", "nuanced examples", "strategic implications", "abstract concepts"]
    interaction_markers: ["analytical depth", "sophisticated transitions", "strategic pauses"]
    transition_phrases: [
      "The really interesting aspect here is...",
      "What this reveals is...",
      "Looking at this more strategically...",
      "The underlying pattern suggests...",
      "From a broader perspective..."
    ]
    content_pacing: "brisk"  # 較快節奏，專業效率
    structural_depth: "complex"  # 5-6層複雜分析
    
    # 概念拆解與重複配置
    concept_processing:
      explanation_depth: "analytical"  # 分析性深入解釋
      breakdown_style: "systematic_analysis"  # 系統性分析拆解
      technical_terms: "professional_usage"  # 專業術語恰當使用
    
    vocabulary_adaptation:
      complexity_level: "professional_nuanced"  # 專業細致詞彙
      explanation_trigger: "abstract_concepts"  # 抽象概念觸發拆解
      synonym_usage: "sophisticated_alternatives"  # 精細同義表達
    
    repetition_strategy:
      frequency: "selective"  # 選擇性重複關鍵洞察
      methods: ["nuanced_reframing", "strategic_emphasis", "analytical_reinforcement"]
      pattern: "insight_driven"  # 洞察驅動的重述
    
    # 標籤嵌入策略配置
    tag_embedding:
      density: "high"                   # 標籤使用密度
      emotion_range: ["analytical", "thoughtful", "professional", "insightful", "confident", "passionate", "sophisticated", "authoritative", "intense", "focused"]
      pause_frequency: "strategic"      # 暫停頻率
      prosody_usage: "rich"             # 語調變化使用程度
      primary_style: "[professional]"
    
  C1:  # 智者 - 快速洞察
    style_name: "智者"
    conversation_style: ["sharp", "analytical", "sophisticated", "direct", "insightful"]
    voices: { host_voice: "Aoede", expert_voice: "Fenrir" }  # 優雅女+專業男
    pace: "fast"
    knowledge_density: "high"
    interaction_level: "low"
    creativity: 0.7
    techniques: ["sharp analysis", "sophisticated connections", "implicit assumptions", "strategic implications", "systemic thinking"]
    dialogue_structure: [
      "Immediate Context & Core Issues",
      "Critical Analysis & Key Insights", 
      "Deeper Implications & Connections",
      "Nuanced Perspectives & Complications",
      "Strategic Synthesis & Future Outlook"
    ]
    conversation_markers: [
      "The real question here is...",
      "What's particularly significant is...",
      "This connects to the broader...",
      "The strategic implication is..."
    ]
    # 專業結構化配置
    engagement_factors: ["sharp insights", "systemic connections", "strategic implications", "sophisticated analysis"]
    interaction_markers: ["direct transitions", "sharp focus shifts", "insight moments"]
    transition_phrases: [
      "The real question here is...",
      "What's particularly significant is...",
      "The strategic implication is...",
      "This reveals something fundamental...",
      "The systemic impact suggests..."
    ]
    content_pacing: "rapid"  # 快速節奏，直擊要點
    structural_depth: "expert"  # 6-7層專家級分析
    
    # 概念拆解與重複配置
    concept_processing:
      explanation_depth: "strategic"  # 戰略性選擇性解釋
      breakdown_style: "systemic_insight"  # 系統性洞察拆解
      technical_terms: "expert_fluency"  # 專家級流暢使用
    
    vocabulary_adaptation:
      complexity_level: "expert_precise"  # 專家精確詞彙
      explanation_trigger: "fundamental_shifts"  # 根本性轉變觸發解釋
      synonym_usage: "precise_technical"  # 精確技術表達
    
    repetition_strategy:
      frequency: "minimal_strategic"  # 最少戰略性重述
      methods: ["sharp_reinforcement", "systemic_connection", "insight_crystallization"]
      pattern: "breakthrough_moments"  # 突破性洞察時刻
    
    # 標籤嵌入策略配置
    tag_embedding:
      density: "very_high"              # 標籤使用密度
      emotion_range: ["analytical", "insightful", "professional", "sharp", "sophisticated", "authoritative", "expert", "intense", "focused", "strategic"]
      pause_frequency: "strategic"      # 暫停頻率
      prosody_usage: "very_rich"        # 語調變化使用程度
      primary_style: "[professional]"
    
  C2:  # 大師 - 專精論述
    style_name: "master"
    conversation_style: ["expert", "sophisticated", "nuanced", "authoritative", "complex"]
    voices: { host_voice: "Aoede", expert_voice: "Fenrir" }  # 優雅女+專業男
    pace: "fast"
    knowledge_density: "very_high"
    interaction_level: "very_low"
    creativity: 0.8
    techniques: ["expert discourse", "subtle implications", "technical precision", "complex interdependencies", "multi-layered analysis"]
    dialogue_structure: [
      "Expert Opening & Immediate Analysis",
      "Deep Technical & Conceptual Exploration",
      "Multi-Dimensional Implications & Effects", 
      "Sophisticated Synthesis & Integration",
      "Advanced Future Projections & Conclusions"
    ]
