# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                        播客生成配置文件 - Podcast Config                      ║
# ║                     使用 Podcastfy + Gemini Multi-Speaker TTS               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            基本設定 (Basic Settings)                      │
# └─────────────────────────────────────────────────────────────────────────┘
basic:
  # 英語等級設定
  # - A1/A2: 初級（簡單詞彙、基礎句型）
  # - B1/B2: 中級（日常話題、複雜語法）  
  # - C1/C2: 高級（專業內容、母語水準）
  english_level: "A2"
  
  # 播客長度模式（四種選項）
  # - short:      3-5 分鐘（快速導覽）
  # - medium:     6-10 分鐘（標準探討）
  # - long:       11-15 分鐘（深度分析）
  # - extra-long: 16-45 分鐘（完整專題）
  podcast_length: "short"
  
  # 對話風格指令（可自訂多個關鍵詞，用逗號分隔）
  style_instructions: "conversational, engaging, educational"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            輸入來源 (Input Source)                        │
# └─────────────────────────────────────────────────────────────────────────┘
input:
  # 支援多種輸入格式：
  # - 純文字內容：直接輸入文字
  # - 本地文件：./path/to/file.txt 或 ./path/to/document.pdf
  # - 網頁文章：https://example.com/article
  # - YouTube 影片：https://youtube.com/watch?v=VIDEO_ID
  source: "https://tw.news.yahoo.com/麥克風沒關-川普曝蒲亭-為了我-達成協議-021649771.html"
  
  # 輸入類型（建議使用 "auto" 自動檢測）
  # 可選值：auto, text, pdf, url, youtube
  type: "auto"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                         語音設定 (Voice Configuration)                     │
# └─────────────────────────────────────────────────────────────────────────┘
voices:
  # Gemini Multi-Speaker TTS 提供的聲線選項：
  # 
  # 【女聲】
  # - Kore:  溫和親切，適合主持人角色
  # - Aoede: 優雅文藝，適合文化話題
  # 
  # 【男聲】  
  # - Puck:   活潑年輕，適合專家解說
  # - Charon: 沈穩權威，適合嚴肅話題
  # - Fenrir: 專業清晰，適合技術內容
  
  # 主持人聲線 (Person1)
  host_voice: "Kore"
  
  # 專家聲線 (Person2)
  expert_voice: "Aoede"
  
  # 💡 推薦聲線搭配：
  # - Kore + Puck:   女主持 + 男專家（活潑對話）
  # - Aoede + Charon: 女專家 + 男主持（深度討論）
  # - Fenrir + Aoede: 男專業 + 女優雅（技術解說）

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                          進階設定 (Advanced Settings)                      │
# └─────────────────────────────────────────────────────────────────────────┘
advanced:
  # TTS 選項（建議保持 false，使用 Gemini Multi-Speaker TTS）
  use_podcastfy_tts: false
  
  # 輸出目錄路徑
  output_dir: "./output"
  
  # LLM 模型選擇（用於生成腳本）
  # - gemini-2.5-flash: 快速、經濟
  # - gemini-2.5-pro:   品質更高、成本較高
  llm_model: "gemini-2.5-flash"
  
  # TTS 模型選擇（用於生成語音）
  # - gemini-2.5-flash-preview-tts: 快速生成
  # - gemini-2.5-pro-preview-tts:   高品質語音
  tts_model: "gemini-2.5-flash-preview-tts"
  
  # 對話風格參數（Podcastfy 內部使用）
  conversation_style: ["engaging", "educational"]
  
  # 語言設定
  language: "English"
  
  # 對話結構
  dialogue_structure: "two_speakers"
  
  # 【進階】手動覆蓋長度控制（一般不需要修改）
  # word_count: 1000      # 手動設定目標字數
  # max_num_chunks: 8     # 手動設定最大輪次
  # min_chunk_size: 700   # 手動設定最小區塊大小

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                              使用範例 (Examples)                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
examples:
  # 各種輸入來源範例：
  text_file: "./sample_article.txt"           # 本地文字檔案
  pdf_file: "./research_paper.pdf"            # PDF 文檔
  web_article: "https://example.com/article"  # 網路文章
  youtube_video: "https://youtube.com/watch?v=VIDEO_ID"  # YouTube 影片

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                              參考資訊 (Reference)                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      英語等級詳細說明 (CEFR Levels)                        │
# └─────────────────────────────────────────────────────────────────────────┘
# A1 - 初學者：能理解並使用熟悉的日常表達和基本詞彙
# A2 - 初級：能理解日常生活中的句子和常用語
# B1 - 中級：能理解工作、學校、休閒等場合的要點
# B2 - 中上級：能理解複雜文章的主要內容，包括技術討論
# C1 - 高級：能理解長篇複雜的文章，並辨識隱含意義
# C2 - 精通：能輕鬆理解所有聽到或讀到的內容

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                   播客長度模式詳細說明 (Length Modes)                      │
# └─────────────────────────────────────────────────────────────────────────┘
#
# 【SHORT】3-5 分鐘
#   用途：快速概覽、新聞摘要、每日更新
#   字數：700-1200 字
#   特點：重點突出、節奏明快、資訊密集
#
# 【MEDIUM】6-10 分鐘  
#   用途：主題探討、教學內容、產品介紹
#   字數：1500-2500 字
#   特點：深度適中、例證充分、易於消化
#
# 【LONG】11-15 分鐘
#   用途：深度分析、案例研究、技術講解
#   字數：2800-3800 字
#   特點：全面詳盡、邏輯嚴謹、觀點多元
#
# 【EXTRA-LONG】16-45 分鐘
#   用途：完整訪談、系列專題、深度紀錄
#   字數：4000-11000 字
#   特點：鉅細靡遺、多方觀點、深入探究

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                          快速開始指南 (Quick Start)                        │
# └─────────────────────────────────────────────────────────────────────────┘
# 1. 設定你的 API Key：
#    export GEMINI_API_KEY="your-api-key-here"
#
# 2. 選擇播客長度：
#    修改 basic.podcast_length 為 short/medium/long/extra-long
#
# 3. 輸入內容來源：
#    修改 input.source 為你的文章網址或檔案路徑
#
# 4. 執行生成：
#    python podcast_workflow.py --mode prod
#
# 5. 查看結果：
#    音頻檔案將保存在 output/audio/ 目錄中

