# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                        播客生成配置文件 - Podcast Config                      ║
# ║                     使用 Podcastfy + Gemini Multi-Speaker TTS               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            基本設定 (Basic Settings)                      │
# └─────────────────────────────────────────────────────────────────────────┘
basic:
  # 英語等級設定
  # - A1/A2: 初級（簡單詞彙、基礎句型）
  # - B1/B2: 中級（日常話題、複雜語法）  
  # - C1/C2: 高級（專業內容、母語水準）
  english_level: "A2"
  
  # 播客長度模式（四種選項）
  # - short:      3-5 分鐘（快速導覽）
  # - medium:     6-10 分鐘（標準探討）
  # - long:       11-15 分鐘（深度分析）
  # - extra-long: 16-45 分鐘（完整專題）
  podcast_length: "short"
  
  # 對話風格指令（可自訂多個關鍵詞，用逗號分隔）
  style_instructions: "conversational, engaging, educational"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            輸入來源 (Input Source)                        │
# └─────────────────────────────────────────────────────────────────────────┘
input:
  # 🚀 【新功能】多資料來源支援
  # 使用 sources 陣列可以同時處理多個來源，生成整合性播客
  sources:
    - "https://tw.news.yahoo.com/麥克風沒關-川普曝蒲亭-為了我-達成協議-021649771.html"
    # - "https://youtube.com/watch?v=VIDEO_ID"      # YouTube 影片
    # - "./research_paper.pdf"                      # 本地 PDF 文檔
    # - "./article.txt"                             # 本地文字檔案
    # - "這是直接輸入的文字內容，也會被整合到播客中..."   # 直接文字
  
  # 📌 向後相容：單一來源模式（當 type != "multi" 時使用）
  source: "https://tw.news.yahoo.com/麥克風沒關-川普曝蒲亭-為了我-達成協議-021649771.html"
  
  # 輸入類型選項：
  # - multi: 使用 sources 陣列處理多個來源
  # - auto:  單一來源自動檢測類型
  # - text, pdf, url, youtube: 單一來源手動指定類型
  type: "multi"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                         語音設定 (Voice Configuration)                     │
# └─────────────────────────────────────────────────────────────────────────┘
voices:
  # Gemini Multi-Speaker TTS 提供的聲線選項：
  # 
  # 【女聲】
  # - Kore:  溫和親切，適合主持人角色
  # - Aoede: 優雅文藝，適合文化話題
  # 
  # 【男聲】  
  # - Puck:   活潑年輕，適合專家解說
  # - Charon: 沈穩權威，適合嚴肅話題
  # - Fenrir: 專業清晰，適合技術內容
  
  # 主持人聲線 (Person1)
  host_voice: "Kore"
  
  # 專家聲線 (Person2)
  expert_voice: "Aoede"
  
  # 💡 推薦聲線搭配：
  # - Kore + Puck:   女主持 + 男專家（活潑對話）
  # - Aoede + Charon: 女專家 + 男主持（深度討論）
  # - Fenrir + Aoede: 男專業 + 女優雅（技術解說）

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                          進階設定 (Advanced Settings)                      │
# └─────────────────────────────────────────────────────────────────────────┘
advanced:
  # TTS 選項（建議保持 false，使用 Gemini Multi-Speaker TTS）
  use_podcastfy_tts: false
  
  # 輸出目錄路徑
  output_dir: "./output"
  
  # LLM 模型選擇（用於生成腳本）
  # - gemini-2.5-flash: 快速、經濟
  # - gemini-2.5-pro:   品質更高、成本較高
  llm_model: "gemini-2.5-flash"
  
  # TTS 模型選擇（用於生成語音）
  # - gemini-2.5-flash-preview-tts: 快速生成
  # - gemini-2.5-pro-preview-tts:   高品質語音
  tts_model: "gemini-2.5-flash-preview-tts"
  
  # 對話風格參數（Podcastfy 內部使用）
  conversation_style: ["engaging", "educational"]
  
  # 語言設定
  language: "English"
  
  # 對話結構
  dialogue_structure: "two_speakers"
  
  # 【進階】手動覆蓋長度控制（一般不需要修改）
  # word_count: 1000      # 手動設定目標字數
  # max_num_chunks: 8     # 手動設定最大輪次
  # min_chunk_size: 700   # 手動設定最小區塊大小

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      Podcastfy 進階客製化 (Advanced Customization)         │
# └─────────────────────────────────────────────────────────────────────────┘
podcastfy:
  # 🎙️ 播客品牌化
  podcast_name: "Learn with AI"
  podcast_tagline: "Making Complex Topics Simple for English Learners"
  
  # 🌍 輸出語言（與 advanced.language 不同，這是最終音頻語言）
  output_language: "English"
  
  # 🎭 對話風格（可組合多個風格創造獨特體驗）
  conversation_style: 
    - "engaging"          # 吸引人的
    - "educational"       # 教育性的
    - "supportive"        # 支持性的，適合學習者
    - "clear"             # 清晰表達
    - "patient"           # 有耐心的解釋
  
  # 👥 說話者角色定義（比 Person1/Person2 更具體）
  roles_person1: "English Learning Host"     # 主持人：友善、鼓勵、會問學習者想問的問題
  roles_person2: "Subject Matter Expert"     # 專家：知識豐富、能將複雜概念簡化
  
  # 📋 對話結構流程（自定義播客架構，創造一致的學習體驗）
  dialogue_structure:
    - "Welcome & Warm Introduction"    # 溫暖歡迎和介紹
    - "Topic Overview & Why It Matters" # 主題概覽和重要性
    - "Key Concepts Breakdown"         # 關鍵概念拆解
    - "Real-World Applications"        # 實際應用場景
    - "Common Mistakes & Tips"         # 常見錯誤和技巧
    - "Practice Suggestions"           # 練習建議
    - "Summary & Encouragement"        # 總結和鼓勵
  
  # 🎯 參與技巧（讓內容更吸引人，提升學習效果）
  engagement_techniques:
    - "rhetorical questions"           # 修辭性問句（"Have you ever wondered...?"）
    - "analogies"                     # 類比說明（"Think of it like..."）
    - "real-world examples"            # 現實例子
    - "step-by-step explanations"     # 步驟式解釋
    - "encouragement phrases"          # 鼓勵用語（"You're doing great!"）
    - "repetition for emphasis"        # 強調性重複
    - "bridging phrases"              # 連接用語（"Let me explain that differently"）
    
  # 🎨 創造力控制（0=嚴格事實, 1=平衡, 2=創意豐富）
  # 學習用途建議使用適中創造力確保準確性同時保持趣味
  creativity: 0.6
  
  # ✍️ 自定義指令（會覆蓋預設模板，可添加特殊要求）
  user_instructions: |
    Focus on making complex topics accessible to English learners.
    Use graduated difficulty progression - start simple, build complexity.
    Always provide context and background before introducing new concepts.
    Include pronunciation guidance for difficult technical terms.
    Use positive, encouraging language throughout.
    When explaining, use the "scaffold" technique: simple explanation → example → more detail.

