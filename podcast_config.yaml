      pause_frequency: "strategic"      # 暫停頻率
      prosody_usage: "very_rich"        # 語調變化使用程度
      primary_style: "[professional]"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                    長度自動配置 (Length Auto-Configuration)                 │
# └─────────────────────────────────────────────────────────────────────────┘
length_configs:
  short:
    word_count: 950
    max_num_chunks: 5
    min_chunk_size: 650
    time_range: "3-5 分鐘"
    approach: "快速概覽，重點突出"
    
  medium:
    word_count: 2000
    max_num_chunks: 8
    min_chunk_size: 700
    time_range: "6-10 分鐘"
    approach: "適度探討，平衡深度"
    
  long:
    word_count: 3300
    max_num_chunks: 12
    min_chunk_size: 800
    time_range: "11-15 分鐘"
    approach: "深度分析，多角度探討"
    
  extra-long:
    word_count: 7500
    max_num_chunks: 20
    min_chunk_size: 1000
    time_range: "16-45 分鐘"
    approach: "全面探究，專業深度"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      語言教學配置 (Language Teaching Configuration)              │
# └─────────────────────────────────────────────────────────────────────────┘
language_teaching:
  enabled: true                        # 是否啟用語言教學功能
  teaching_spectrum:                   # 教學光譜設計
    A1: "explicit_teaching"            # 明確教學 (80% 語言 + 20% 內容)
    A2: "guided_learning"              # 引導學習 (60% 語言 + 40% 內容)  
    B1: "integrated_teaching"          # 整合教學 (40% 語言 + 60% 內容)
    B2: "occasional_tips"              # 偶爾提點 (20% 語言 + 80% 內容)
    C1: "content_focused"              # 內容聚焦 (5% 語言 + 95% 內容)
    C2: "pure_content"                 # 純內容導向 (0% 語言 + 100% 內容)
  
  common_teaching_elements:            # 通用教學元素
    vocabulary_explanation: true       # 詞彙解釋
    grammar_highlighting: true         # 語法突出
    pronunciation_tips: true           # 發音提示
    usage_examples: true               # 使用範例
    alternative_expressions: true      # 替代表達

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                       標籤嵌入配置 (Tag Embedding Configuration)              │
# └─────────────────────────────────────────────────────────────────────────┘
tag_embedding:
  enabled: true
  models:
    analysis_model: "gemini-2.5-flash"  # 用於快速分析
    tagging_model: "gemini-2.5-pro"   # 用於精細標記
  
  # LLM 模型參數配置
  model_parameters:
    temperature: 0.5              # 創造性控制 (0.0-1.0, 越低越一致)
    top_p: 0.8                   # 核心採樣 (0.0-1.0, 控制詞彙多樣性)
    top_k: 40                    # 候選詞數量限制
    max_output_tokens: 8192      # 最大輸出 token 數
    
  # 內容處理參數
  content_processing:
    chunk_size: 500              # 長腳本分段處理大小 (字數) - 每500字一段
    overlap_size: 100            # 分段重疊大小 (字數) - 保持上下文連貫
    retry_attempts: 3            # API 失敗重試次數
    fallback_enabled: true       # 失敗時是否降級為原始腳本
    
  # 標籤驗證參數
  tag_validation:
    max_tags_per_100_words: 25   # 標籤密度上限控制（提高以支援豐富情感）
    remove_invalid_tags: true    # 移除無效標籤
    fix_format_errors: true      # 自動修正格式錯誤

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                          技術設定 (Technical Settings)                      │
# └─────────────────────────────────────────────────────────────────────────┘
advanced:
  use_podcastfy_tts: false
  output_dir: "./output"
  llm_model: "gemini-2.5-flash"
  tts_model: "gemini-2.5-flash-preview-tts"
  language: "English"
  dialogue_structure: "two_speakers"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      核心自然對話原則 (Core Natural Principles)              │
# └─────────────────────────────────────────────────────────────────────────┘
natural_conversation_core: |
  所有等級都遵循自然對話原則：
  
  ✅ 自然對話標記：
  - "That's fascinating because..."
  - "What strikes me is..."
  - "I hadn't thought of it that way..."
  - "Building on what you said..."
  - "That reminds me of..."
  
  ❌ 避免教學語言：
  - "Let me explain..."
  - "It's important to understand..."
  - "The lesson here is..."
  - "You should know that..."
  
  🎯 目標：真實的智識好奇心，不是結構化教育

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                     專業結構化配置說明 (Professional Structure Guide)           │
# └─────────────────────────────────────────────────────────────────────────┘

professional_structure_guide: |
  🏗️ 新增專業結構化功能：
  
  ✅ engagement_factors: 參與要素控制
  - 定義每個等級使用的具體參與技巧
  - 如：questions, examples, analogies, analysis等
  
  ✅ interaction_markers: 互動標記
  - 控制對話間的過渡和連接方式
  - 如：gentle transitions, analytical bridges等
  
  ✅ transition_phrases: 過渡語句
  - 具體的段落轉換用語
  - 提升對話自然度和流暢性
  
  ✅ content_pacing: 內容節奏
  - very_slow → intensive: 控制段落間節奏
  - 配合pace參數優化整體體驗
  
  ✅ structural_depth: 結構深度
  - basic → masterful: 控制分析層次
  - 從2-3層到7-8層的漸進複雜度

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                          快速使用指南 (Quick Guide)                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝

usage_guide: |
  🚀 簡單兩步驟：
  1. 選擇等級：修改 basic.english_level (A1/A2/B1/B2/C1/C2)
  2. 選擇長度：修改 basic.podcast_length (short/medium/long/extra-long)
  3. 執行：python generate_script.py

