# ║                              使用範例 (Examples)                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        單一來源範例 (Single Source)                        │
# └─────────────────────────────────────────────────────────────────────────┘
single_source_examples:
  text_file: "./sample_article.txt"           # 本地文字檔案
  pdf_file: "./research_paper.pdf"            # PDF 文檔
  web_article: "https://example.com/article"  # 網路文章
  youtube_video: "https://youtube.com/watch?v=VIDEO_ID"  # YouTube 影片

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        多資料來源範例 (Multi Sources)                      │
# └─────────────────────────────────────────────────────────────────────────┘
multi_source_examples:
  # 💡 範例 1：新聞專題播客
  news_topic:
    sources:
      - "https://news.site1.com/breaking-news"
      - "https://news.site2.com/analysis" 
      - "https://youtube.com/watch?v=expert-interview"
    type: "multi"
  
  # 💡 範例 2：學術研究播客
  research_topic:
    sources:
      - "./research_paper_1.pdf"
      - "./research_paper_2.pdf"
      - "https://university.edu/article"
      - "補充說明：這個研究的重要性在於..."
    type: "multi"
    
  # 💡 範例 3：產品介紹播客
  product_review:
    sources:
      - "https://company.com/product-page"
      - "https://youtube.com/watch?v=demo-video"
      - "./user_manual.pdf"
      - "./customer_feedback.txt"
    type: "multi"

