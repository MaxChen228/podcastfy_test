# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    統一播客配置 - Unified Podcast Config                    ║
# ║              只需選擇等級和長度，自動配置自然對話風格                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        用戶選擇 (User Selection)                           │
# └─────────────────────────────────────────────────────────────────────────┘
basic:
  # 英語等級（唯一的風格選擇器）
  # A1: 探索者 - 緩慢共同發現，大量背景
  # A2: 好奇者 - 耐心建立理解，熟悉例子
  # B1: 討論者 - 平衡探索，混合複雜度
  # B2: 分析者 - 深入對話，專業詞彙
  # C1: 智者 - 快速洞察，直接核心
  # C2: 大師 - 專精論述，複雜關聯
  english_level: "A2"
  
  # 播客長度
  # short: 3-5分鐘, medium: 6-10分鐘, long: 11-15分鐘, extra-long: 16-45分鐘
  podcast_length: "long"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            輸入來源 (Input Sources)                        │
# └─────────────────────────────────────────────────────────────────────────┘
input:
  # 多資料來源支援
  sources:
    - "https://medium.com/westenberg/i-deleted-my-second-brain-b7a65bce3717"
    - "https://medium.com/write-a-catalyst/i-self-hosted-openais-gpt-3-5-turbo-to-build-my-own-ai-second-brain-8e1852b93228"
    - "https://medium.com/pen-with-paper/this-8-second-brain-hack-will-end-your-procrastination-forever-d640256a1023"
    - "https://medium.com/@xception08/support-your-gut-its-your-second-brain-cba7b5abf256"
  type: "multi"

