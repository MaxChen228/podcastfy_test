# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    統一播客配置 - Unified Podcast Config                    ║
# ║              只需選擇等級和長度，自動配置自然對話風格                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        用戶選擇 (User Selection)                           │
# └─────────────────────────────────────────────────────────────────────────┘
basic:
  # 英語等級（唯一的風格選擇器）
  # A1: 探索者 - 緩慢共同發現，大量背景
  # A2: 好奇者 - 耐心建立理解，熟悉例子
  # B1: 討論者 - 平衡探索，混合複雜度
  # B2: 分析者 - 深入對話，專業詞彙
  # C1: 智者 - 快速洞察，直接核心
  # C2: 大師 - 專精論述，複雜關聯
  english_level: "B1"
  
  # 播客長度
  # short: 3-5分鐘, medium: 6-10分鐘, long: 11-15分鐘, extra-long: 16-45分鐘
  podcast_length: "medium"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                            輸入來源 (Input Sources)                        │
# └─────────────────────────────────────────────────────────────────────────┘
input:
  # 多資料來源支援
  sources:
    - "https://medium.com/write-a-catalyst/you-are-fired-now-80458d77205a"
    - "https://medium.com/@huonglanchu/managing-technical-debt-in-the-age-of-vibe-coding-1ceafd97b0a2"
    - "https://medium.com/entrepreneur-s-handbook/lets-talk-about-what-vibe-coding-is-really-for-984bd7d19497"
    - "https://medium.com/entrepreneur-s-handbook/should-you-be-vibe-coding-c56b5f0708a1"
  type: "multi"

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      等級自動配置 (Level Auto-Configuration)                │
# └─────────────────────────────────────────────────────────────────────────┘
# 🤖 系統會根據選擇的 english_level 自動應用以下配置
level_configs:
  A1:  # 探索者 - 緩慢共同發現
    style_name: "探索者"
    conversation_style: ["gentle", "wondering", "patient", "supportive", "exploratory"]
    voices: { host_voice: "Kore", expert_voice: "Puck" }  # 溫和女+活潑男
    pace: "slow"
    knowledge_density: "very_low"
    interaction_level: "high"
    creativity: 0.3
    techniques: ["simple analogies", "concrete examples", "gentle questioning", "patient exploration", "encouraging discoveries"]
    dialogue_structure: [
      "Friendly Hello & What We're Curious About",
      "First Look & Simple Impressions", 
      "Understanding Step by Step",
      "Connecting to What We Know",
      "Discovering Together",
      "What We Learned Today"
    ]
    conversation_markers: [
      "Hmm, I wonder what this means...",
      "Oh, that's like when...",
      "Wait, can you help me understand...",
      "That makes me think of..."
    ]
    # 專業結構化配置
    engagement_factors: ["questions", "examples", "simple analogies", "encouraging discoveries"]
    interaction_markers: ["gentle transitions", "patient pauses", "supportive acknowledgments"]
    transition_phrases: [
      "Let's explore this together...",
      "What do you think about...",
      "That reminds me...",
      "I'm curious about..."
    ]
    content_pacing: "very_slow"  # 段落間充分停頓
    structural_depth: "basic"  # 簡單2-3層結構
    
  A2:  # 好奇者 - 耐心建立理解
    style_name: "好奇者"
    conversation_style: ["curious", "patient", "supportive", "encouraging", "friendly"]
    voices: { host_voice: "Kore", expert_voice: "Charon" }  # 溫和女+沈穩男
    pace: "slow"
    knowledge_density: "low"
    interaction_level: "high"
    creativity: 0.4
    techniques: ["relatable examples", "step-by-step thinking", "familiar analogies", "clarifying questions", "building understanding slowly"]
    dialogue_structure: [
      "Warm Welcome & Topic Introduction",
      "First Thoughts & Initial Questions",
      "Building Understanding Together", 
      "Real-World Connections",
      "Putting Pieces Together",
      "Reflecting on Our Journey"
    ]
    conversation_markers: [
      "I'm starting to see...",
      "That reminds me of...",
