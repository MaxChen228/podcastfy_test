    approach: "快速概覽，重點突出"
    
  medium:
    word_count: 2000
    max_num_chunks: 8
    min_chunk_size: 700
    time_range: "6-10 分鐘"
    approach: "適度探討，平衡深度"
    
  long:
    word_count: 3300
    max_num_chunks: 12
    min_chunk_size: 800
    time_range: "11-15 分鐘"
    approach: "深度分析，多角度探討"
    
  extra-long:
    word_count: 7500
